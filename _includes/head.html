<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ site.description }}">
<title>{{ page.title | default: site.title }}</title>
<link rel="canonical" href="{{ site.url }}{{ page.url }}">

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-61SRBNSDJP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-61SRBNSDJP');
</script>

<!-- Open Graph -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:url" content="{{ site.url }}">
<meta property="og:type" content="website">
<meta property="og:image" content="{{ '/assets/images/og/og-default.jpg' | absolute_url }}">


<!-- Twitter (fallback to OG, but cleaner previews) -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
<meta name="twitter:image" content="{{ '/assets/images/og/og-default.jpg' | absolute_url }}">

<!-- FAQ Schema for AI/search indexing -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is Espanglito?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Espanglito makes t-shirts for people who live between two worlds — the intersection of Spanish and English culture. Real humor, real identity, real community. Not corporate falsity"
      }
    },
    {
      "@type": "Question",
      "name": "How do I submit a shirt idea?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Send your idea via WhatsApp or email. If we make it and sell ten, you get one free. No strings, no pitch deck required."
      }
    },
    {
      "@type": "Question",
      "name": "Where can I buy Espanglito shirts?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Click the buy button or visit directly at shop.espanglito.com"
      }
    }
  ]
}
</script>
