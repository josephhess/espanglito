<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --ink: #1a1a1a;
      --red: #c0392b;
      --warm-gray: #888;
      --card-bg: #fff;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Georgia', serif;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    /* HEADER */
    header {
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      border-bottom: 2px solid var(--ink);
    }

    header img.logo {
      max-width: 280px;
      width: 100%;
    }

    /* MAIN */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* HERO */
    .hero {
      padding: 3.5rem 0 2.5rem;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.15;
      margin-bottom: 1.2rem;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--red);
    }

    .hero p {
      font-size: 1.15rem;
      max-width: 560px;
      margin: 0 auto 1rem;
      color: #333;
    }

    /* SECTION TITLES */
    .section-title {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--warm-gray);
      margin-bottom: 1.5rem;
      padding-top: 3rem;
      border-top: 1px solid #ddd;
    }

    /* DESIGNS GRID */
    .designs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 2rem;
      margin-bottom: 1rem;
    }

    .design-card {
      background: var(--card-bg);
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
      text-align: center;
    }

    .design-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      padding: 1.5rem;
      background: #fafafa;
    }

    .design-card .card-body {
      padding: 1rem 1.2rem 1.4rem;
    }

    .design-card h3 {
      font-size: 1.05rem;
      margin-bottom: 0.3rem;
    }

    .design-card p {
      font-size: 0.9rem;
      color: var(--warm-gray);
    }

    /* CTA BLOCK */
    .cta-block {
      background: var(--ink);
      color: var(--cream);
      border-radius: 6px;
      padding: 2.5rem 2rem;
      text-align: center;
      margin-top: 3rem;
    }

    .cta-block h2 {
      font-size: 1.6rem;
      margin-bottom: 0.8rem;
    }

    .cta-block p {
      font-size: 1rem;
      margin-bottom: 1.5rem;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0.85;
    }

    .btn-whatsapp {
      display: inline-block;
      background: #25d366;
      color: #fff;
      font-family: sans-serif;
      font-size: 0.95rem;
      font-weight: bold;
      padding: 0.75rem 1.75rem;
      border-radius: 50px;
      letter-spacing: 0.02em;
    }

    .btn-whatsapp:hover { background: #1da851; }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 2rem 1.5rem;
      font-family: sans-serif;
      font-size: 0.85rem;
      color: var(--warm-gray);
      border-top: 1px solid #ddd;
    }

    footer a {
      color: var(--ink);
      font-weight: bold;
    }

    footer a:hover { color: var(--red); }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
